// fragment_service.proto
syntax = "proto3";

package com.github.paohaijiao.distributed.grpc;

option java_package = "com.github.paohaijiao.distributed.grpc";
option java_outer_classname = "FragmentServiceProto";

service FragmentService {
  // 提交Fragment执行
  rpc ExecuteFragment (FragmentRequest) returns (FragmentResponse);

  // 流式数据传输
  rpc SendData (stream DataChunk) returns (DataAck);

  // 拉取数据
  rpc FetchData (FetchRequest) returns (stream DataChunk);

  // 健康检查
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

message FragmentRequest {
  string taskId = 1;
  string fragmentId = 2;
  string fragmentType = 3;  // SOURCE, INTERMEDIATE, SINK
  bytes serializedPlan = 4;  // 序列化的物理计划
  repeated ExchangeInput inputs = 5;
  ExchangeOutput output = 6;
  int32 parallelism = 7;
}

message ExchangeInput {
  string exchangeId = 1;
  string sourceHost = 2;
  int32 sourcePort = 3;
  string partitionStrategy = 4;
  repeated string partitionKeys = 5;
}

message ExchangeOutput {
  string exchangeId = 1;
  string partitionStrategy = 2;
  repeated string partitionKeys = 3;
  int32 targetParallelism = 4;
}

message FragmentResponse {
  string taskId = 1;
  string fragmentId = 2;
  bool success = 3;
  string errorMessage = 4;
  int64 rowsProcessed = 5;
}

message DataChunk {
  string exchangeId = 1;
  int32 partitionId = 2;
  int32 sequenceNumber = 3;
  bytes data = 4;
  bool isLast = 5;
}

message DataAck {
  string exchangeId = 1;
  int32 partitionId = 2;
  int32 receivedSeq = 3;
  bool success = 4;
}

message FetchRequest {
  string exchangeId = 1;
  int32 partitionId = 2;
}

message HealthCheckRequest {
  string serviceName = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
}